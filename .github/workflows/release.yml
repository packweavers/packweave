name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-latest
            args: --bundles appimage
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: System dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: packweave ${{ github.ref_name }}
          releaseDraft: true
          args: ${{ matrix.args }}
      - name: Publish stable name installers
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          mkdir -p dist-stable
          find src-tauri/target -type f -path '*/bundle/*' | while read -r f; do
            case "$f" in
              *_aarch64.dmg) name=packweave-macos-arm64.dmg ;;
              *_x64.dmg | *_x86_64.dmg) name=packweave-macos-x64.dmg ;;
              *-setup.exe) name=packweave-windows-x64.exe ;;
              *_amd64.AppImage | *_x86_64.AppImage) name=packweave-linux-x86_64.AppImage ;;
              *) continue ;;
            esac
            cp "$f" "dist-stable/$name"
            gh release upload "$tag" "dist-stable/$name" --clobber --repo "$GITHUB_REPOSITORY"
          done
